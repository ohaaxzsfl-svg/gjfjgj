<!DOCTYPE html>
<html lang="en">
<head>
<meta property="og:title" content="💛❤️💛❤️🩷">
    <meta property="og:description" content="">
    <meta property="og:image" content="https://raw.githubusercontent.com/ohaaxzsfl-svg/fhjgh/f549c6c96cc0c8264237243b6b69ef840602bc25/753298813_122113469589363482_8587942522805759328_n.svg">
    <meta property="og:type" content="https://cnn.com">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Gallery</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0f0f0f;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .gallery-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1100px;
        }
        /* Video Card Wrapper */
        .video-card {
            position: relative;
            display: block; /* Poora card clickable banane ke liye */
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 16 / 9; /* Video thumbnail ratio */
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            background-color: #222;
            cursor: pointer;
        }
        /* Thumbnail Image */
        .video-thumbnail {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease, filter 0.4s ease;
        }
        /* Play Button Overlay */
        .play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.2); /* Shuru me halka dark blanket */
            transition: background 0.3s ease;
        }
        /* Custom Play Button Design */
        .play-button {
            width: 65px;
            height: 65px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.3s ease, background-color 0.3s ease;
        }
        /* Play Icon Triangle */
        .play-icon {
            width: 0;
            height: 0;
            border-top: 12px solid transparent;
            border-bottom: 12px solid transparent;
            border-left: 20px solid #111; /* Black play arrow */
            margin-left: 5px; /* Alignment fix */
        }
        /* Hover Effects */
        .video-card:hover .video-thumbnail {
            transform: scale(1.05); /* Image zoom hogi */
            filter: brightness(0.85); /* Image thodi dark hogi */
        }
        .video-card:hover .play-overlay {
            background: rgba(0, 0, 0, 0.4); /* Background zyada dark hoga */
        }
        .video-card:hover .play-button {
            transform: scale(1.15); /* Play button bada hoga */
            background: #ff0000; /* YouTube jaisa red color hover par */
        }
        .video-card:hover .play-icon {
            border-left-color: #fff; /* Arrow white ho jayega */
        }
    </style>
</head>
<body>

    <div class="gallery-container">
        
        <!-- Image 1 -->
        <a href="https://arisefeistyleery.com/zuguhh3ht6?key=264a9f19f8875fdda67da9449dd2782d" class="video-card">
            <img src="https://raw.githubusercontent.com/pwwjiwi-ship-it/fffffhgf/771af47bb342cc8c689aa58508f824fad28df187/751059878_1001240802753805_4843072182055424497_n%20(1).jpg" alt="Video 1" class="video-thumbnail">
            <div class="play-overlay">
                <div class="play-button"><div class="play-icon"></div></div>
            </div>
        </a>

        <!-- Image 2 -->
        <a href="https://arisefeistyleery.com/qwsa8935?key=ad24b52a3fdec063f1a4034eb1e46d1f" class="video-card">
            <img src="https://raw.githubusercontent.com/pwwjiwi-ship-it/fyfh/c9a3e42046d17b70b5790b0f5dbe94909fdcd016/751224936_1001313886079830_5003378071228117376_n.jpg" alt="Video 2" class="video-thumbnail">
            <div class="play-overlay">
                <div class="play-button"><div class="play-icon"></div></div>
            </div>
        </a>

        <!-- Image 3 -->
        <a href="https://arisefeistyleery.com/zuguhh3ht6?key=264a9f19f8875fdda67da9449dd2782d" class="video-card">
            <img src="https://raw.githubusercontent.com/pwwjiwi-ship-it/fghgf/a90fd19edda5b824b895105bdfbd5882c1344eff/751135118_1001341102743775_6980743492817561491_n.jpg" alt="Video 3" class="video-thumbnail">
            <div class="play-overlay">
                <div class="play-button"><div class="play-icon"></div></div>
            </div>
        </a>

    </div>

</body>
</html>
